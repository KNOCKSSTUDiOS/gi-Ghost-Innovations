<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>G.I. Admin Dashboard</title>
  <style>
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h1 {
      margin-bottom: 10px;
    }
    #log {
      background: #111;
      border: 1px solid #333;
      padding: 15px;
      height: 600px;
      overflow-y: auto;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .entry {
      border-bottom: 1px solid #222;
      padding: 10px 0;
    }
    .timestamp {
      color: #888;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <h1>G.I. Admin Dashboard</h1>
  <div id="log">Waiting for events...</div>

  <script type="module">
    const log = document.getElementById("log");

    function append(entry) {
      const div = document.createElement("div");
      div.className = "entry";
      div.innerHTML = `
        <div class="timestamp">${new Date().toLocaleString()}</div>
        <div>${entry}</div>
      `;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    // Poll backend logs every 2 seconds
    async function poll() {
      try {
        const res = await fetch("http://localhost:3000/admin/logs");
        const data = await res.json();
        append(JSON.stringify(data, null, 2));
      } catch (err) {
        append("ERROR: " + err.message);
      }
    }

    setInterval(poll, 2000);
  </script>

</body>
</html>
